<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react_frontend</title>
    <script>
      // Instant theme loader - applies colors BEFORE React loads
      (function() {
        try {
          var saved = localStorage.getItem('kjp-theme');
          if (saved) {
            var theme = JSON.parse(saved);
            var root = document.documentElement;
            
            // Helper to generate color palette
            function hexToHSL(hex) {
              var r = parseInt(hex.slice(1, 3), 16) / 255;
              var g = parseInt(hex.slice(3, 5), 16) / 255;
              var b = parseInt(hex.slice(5, 7), 16) / 255;
              var max = Math.max(r, g, b), min = Math.min(r, g, b);
              var h, s, l = (max + min) / 2;
              if (max === min) { h = s = 0; }
              else {
                var d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                  case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                  case g: h = ((b - r) / d + 2) / 6; break;
                  case b: h = ((r - g) / d + 4) / 6; break;
                }
              }
              return { h: h * 360, s: s * 100, l: l * 100 };
            }
            
            function hslToHex(h, s, l) {
              s /= 100; l /= 100;
              var a = s * Math.min(l, 1 - l);
              function f(n) {
                var k = (n + h / 30) % 12;
                var color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
                return Math.round(255 * color).toString(16).padStart(2, '0');
              }
              return '#' + f(0) + f(8) + f(4);
            }
            
            function generatePalette(hex) {
              var hsl = hexToHSL(hex);
              return {
                50: hslToHex(hsl.h, Math.min(hsl.s, 30), 97),
                100: hslToHex(hsl.h, Math.min(hsl.s, 40), 94),
                200: hslToHex(hsl.h, Math.min(hsl.s, 50), 86),
                300: hslToHex(hsl.h, Math.min(hsl.s, 60), 74),
                400: hslToHex(hsl.h, hsl.s, 60),
                500: hex,
                600: hslToHex(hsl.h, hsl.s, 40),
                700: hslToHex(hsl.h, hsl.s, 32),
                800: hslToHex(hsl.h, hsl.s, 26),
                900: hslToHex(hsl.h, hsl.s, 20)
              };
            }
            
            // Apply primary palette from border_color
            var borderColor = theme.border_color || theme.borderColor || '#da2b2b';
            var primaryPalette = generatePalette(borderColor);
            for (var shade in primaryPalette) {
              root.style.setProperty('--color-primary-' + shade, primaryPalette[shade]);
              root.style.setProperty('--color-border-' + shade, primaryPalette[shade]);
            }
            
            // Apply button palette
            var buttonPrimary = theme.button_primary || theme.buttonPrimary || '#7f0518';
            var buttonPalette = generatePalette(buttonPrimary);
            for (var shade in buttonPalette) {
              root.style.setProperty('--color-button-' + shade, buttonPalette[shade]);
            }
            
            // Apply other colors
            root.style.setProperty('--color-button-secondary', theme.button_secondary || theme.buttonSecondary || '#eab308');
            root.style.setProperty('--color-hover', theme.hover_color || theme.hoverColor || '#b22e5c');
            root.style.setProperty('--color-pagination-bg', theme.pagination_bg || theme.paginationBg || '#7f0518');
            root.style.setProperty('--color-pagination-text', theme.pagination_text || theme.paginationText || '#ffffff');
            
            // Handle dark/light mode
            var isDark = theme.mode === 'dark';
            if (isDark) {
              root.style.setProperty('--color-bg-primary', '#0f172a');
              root.style.setProperty('--color-bg-secondary', '#1e293b');
              root.style.setProperty('--color-bg-sidebar', '#1e293b');
              root.style.setProperty('--color-bg-body', '#0f172a');
              root.style.setProperty('--color-bg-content', '#1e293b');
              root.style.setProperty('--color-bg-footer', '#0f172a');
              root.style.setProperty('--color-text-primary', '#f1f5f9');
              root.style.setProperty('--color-text-secondary', '#cbd5e1');
              root.style.setProperty('--color-text-sidebar', '#e2e8f0');
              root.style.setProperty('--color-text-content', '#f1f5f9');
              root.classList.add('dark');
            } else {
              root.style.setProperty('--color-bg-primary', theme.bg_primary || theme.bgPrimary || '#ffffff');
              root.style.setProperty('--color-bg-secondary', theme.bg_secondary || theme.bgSecondary || '#f0fdf4');
              root.style.setProperty('--color-bg-sidebar', theme.bg_sidebar || theme.bgSidebar || '#ffffff');
              root.style.setProperty('--color-bg-body', theme.bg_body || theme.bgBody || '#f3f4f6');
              root.style.setProperty('--color-bg-content', theme.bg_content || theme.bgContent || '#ffffff');
              root.style.setProperty('--color-bg-footer', theme.bg_footer || theme.bgFooter || '#111827');
              root.style.setProperty('--color-text-primary', theme.text_primary || theme.textPrimary || '#1f2937');
              root.style.setProperty('--color-text-secondary', theme.text_secondary || theme.textSecondary || '#6b7280');
              root.style.setProperty('--color-text-sidebar', theme.text_sidebar || theme.textSidebar || '#374151');
              root.style.setProperty('--color-text-content', theme.text_content || theme.textContent || '#1f2937');
            }
            
            // Apply font sizes
            var baseFontSize = theme.font_size_base || theme.fontSizeBase || '12';
            var sidebarFontSize = theme.font_size_sidebar || theme.fontSizeSidebar || '12';
            root.style.setProperty('--font-size-base', baseFontSize + 'px');
            root.style.setProperty('--font-size-sidebar', sidebarFontSize + 'px');
            root.style.setProperty('--font-size-sm', Math.max(12, parseInt(baseFontSize) - 2) + 'px');
            root.style.setProperty('--font-size-xs', Math.max(10, parseInt(baseFontSize) - 4) + 'px');
            root.style.setProperty('--font-size-lg', (parseInt(baseFontSize) + 2) + 'px');
            root.style.setProperty('--font-size-xl', (parseInt(baseFontSize) + 4) + 'px');
            root.style.setProperty('--font-size-2xl', (parseInt(baseFontSize) + 8) + 'px');
            root.style.setProperty('--font-size-3xl', (parseInt(baseFontSize) + 14) + 'px');
            
            // Mark that theme was pre-applied
            window.__THEME_PRELOADED__ = true;
          }
        } catch (e) {
          console.log('Theme preload error:', e);
        }
      })();
      
      // Preload website content from localStorage
      (function() {
        try {
          var homeContent = localStorage.getItem('kjp-home-content');
          var aboutContent = localStorage.getItem('kjp-about-content');
          var products = localStorage.getItem('kjp-products');
          
          if (homeContent) {
            window.__HOME_CONTENT__ = JSON.parse(homeContent);
          }
          if (aboutContent) {
            window.__ABOUT_CONTENT__ = JSON.parse(aboutContent);
          }
          if (products) {
            window.__PRODUCTS__ = JSON.parse(products);
          }
        } catch (e) {
          console.log('Content preload error:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
